worker_processes auto;
events { worker_connections 2048; }

http {
    include mime.types;
    default_type application/octet-stream;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log off;
    error_log /var/log/nginx/error.log error;

    # Force HTTP to HTTPS
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name medya.top www.medya.top;

        # Matrix Discovery (.well-known)
        location /.well-known/matrix/ {
            root /var/www/html;
            default_type application/json;
            add_header Access-Control-Allow-Origin *;
        }

        # Matrix Synapse API (Catches /_matrix and /_synapse traffic)
        location ~* ^(\/_matrix|\/_synapse) {
            proxy_pass http://synapse:8008;
            proxy_read_timeout 600s;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            client_max_body_size 50M; 
        }

        # NextJS Landing Page (Catches everything else)
        location / {
            proxy_pass http://landing:3000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name heman.medya.top;

        location / {
            proxy_pass http://element:80;
            proxy_set_header Host $http_host;
        }
    }

    server {
        listen 443 ssl;
        server_name tewn.medya.top;

        location / {
            proxy_pass http://sable:8080;
            proxy_set_header Host $http_host;
        }
    }

    server {
        listen 443 ssl;
        server_name deng.medya.top;

        # Allows mobile apps to sync large chunks of metadata/playlists/artwork safely
        client_max_body_size 20M;

        location / {
            proxy_pass http://kurdish-navidrome:4533;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Protocol $scheme;
            proxy_set_header X-Forwarded-Host $http_host;

            # Vital for audio streaming stability
            proxy_buffering off;

            # WebSocket support for live player sync
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 443 ssl;
        server_name ava.medya.top;

        # Allows mobile apps to sync large chunks of metadata/playlists/artwork safely
        client_max_body_size 20M;

        location / {
            proxy_pass http://navidrome:4533;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Protocol $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
        
            # Vital for audio streaming stability
            proxy_buffering off;

            # WebSocket support for live player sync
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
    
    server {
        listen 443 ssl;
        server_name pinc.medya.top;

        location / {
            proxy_pass http://ketesa:8080;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
        }
    }

    server {
        listen 443 ssl;
        server_name fin.medya.top;

        # Allows uploading/syncing large artwork or subtitles
        client_max_body_size 20M;

        location / {
            proxy_pass http://jellyfin:8096;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Protocol $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            
            # Vital for video streaming stability
            proxy_buffering off;

            # WebSocket support for real-time playback sync and client events
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    server {
        listen 443 ssl;
        server_name pirtuk.medya.top;

        # Increase body size to allow uploading books (EPUBs/PDFs can be large)
        client_max_body_size 50M;

        location / {
            # LinuxServer calibre-web image exposes port 8083 by default
            proxy_pass http://calibre-web:8083;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Protocol $scheme;
            proxy_set_header X-Forwarded-Host $http_host;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
